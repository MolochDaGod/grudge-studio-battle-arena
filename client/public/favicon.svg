<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0d890;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6666;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Shield shape -->
  <path d="M 50 10 L 80 25 L 80 60 Q 80 80 50 90 Q 20 80 20 60 L 20 25 Z" fill="#0f1419" stroke="url(#red)" stroke-width="3"/>
  <!-- Crossed swords -->
  <g fill="url(#gold)">
    <rect x="35" y="30" width="6" height="35" rx="1" transform="rotate(-30 38 47.5)"/>
    <rect x="59" y="30" width="6" height="35" rx="1" transform="rotate(30 62 47.5)"/>
    <circle cx="38" cy="32" r="4"/>
    <circle cx="62" cy="32" r="4"/>
  </g>
  <!-- G letter -->
  <text x="50" y="75" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#red)" text-anchor="middle">G</text>
</svg>
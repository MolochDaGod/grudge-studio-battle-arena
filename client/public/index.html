<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRUDGE Auth - Warlords Login Portal</title>
  <script src="https://js.puter.com/v2/"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    .font-heading { font-family: 'Cinzel', serif; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fadeIn {
      animation: fadeIn 0.6s ease-out;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .animate-pulse-slow {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-amber-900/20 to-slate-900 flex items-center justify-center p-4">
  <div id="app" class="text-center p-8 max-w-2xl w-full">
    <div class="animate-pulse-slow">
      <div class="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full mx-auto mb-4 animate-spin"></div>
      <p class="text-slate-400">Initializing GRUDGE authentication...</p>
    </div>
  </div>

  <script type="module">
    // ═══════════════════════════════════════════════════════════
    // GRUDGE WARLORDS - AUTHENTICATION PORTAL
    // Powered by Puter SSO
    // Version: 2.0.0
    // ═══════════════════════════════════════════════════════════
    
    const APP_CONFIG = {
      // Puter App IDs
      AUTH_APP_ID: 'grudge-auth',
      SERVER_APP_ID: 'app-f9ad7ff9-1a2e-4bb0-a20a-8db9db03a620',
      
      // Session Configuration
      SESSION_PREFIX: 'grudge_session_',
      SESSION_DURATION: 2 * 60 * 60 * 1000, // 2 hours
      SESSION_INDEX_KEY: 'grudge_sessions_index',
      
      // Production URLs
      AUTH_URL: 'https://grudge-auth.puter.site',
      SERVER_URL: 'https://grudge-server.puter.work',
      CLOUD_URL: 'https://grudge-cloud.puter.site',
      STUDIO_URL: 'https://grudgestudio.com',
      
      // Role Mapping (username → role)
      ROLE_MAP: {
        'admin': ['admin', 'grudgewarlord', 'outapps', 'molochdagod'],
        'developer': ['dev', 'developer', 'engineer'],
        'ai_agent': ['ai_agent', 'bot', 'assistant']
      },
      
      // Default role for non-mapped users
      DEFAULT_ROLE: 'premium'
    };
    
    console.log('🎮 GRUDGE Auth Portal v2.0.0');
    console.log('📍 Auth URL:', APP_CONFIG.AUTH_URL);
    console.log('🎯 Studio URL:', APP_CONFIG.STUDIO_URL);

    // ═══════════════════════════════════════════════════════════
    // ROLE MANAGEMENT
    // ═══════════════════════════════════════════════════════════
    
    function getUserRole(username) {
      if (!username) return APP_CONFIG.DEFAULT_ROLE;
      
      const lower = username.toLowerCase();
      
      // Check each role mapping
      for (const [role, usernames] of Object.entries(APP_CONFIG.ROLE_MAP)) {
        if (usernames.includes(lower)) {
          console.log(`✅ Role assigned: ${role} for user ${username}`);
          return role;
        }
      }
      
      console.log(`✅ Default role assigned: ${APP_CONFIG.DEFAULT_ROLE} for user ${username}`);
      return APP_CONFIG.DEFAULT_ROLE;
    }

    // ═══════════════════════════════════════════════════════════
    // SESSION MANAGEMENT
    // ═══════════════════════════════════════════════════════════
    
    function generateSessionCode() {
      // Format: sc_<uuid-without-dashes>
      return 'sc_' + crypto.randomUUID().replace(/-/g, '');
    }

    async function createSession(user) {
      try {
        const sessionCode = generateSessionCode();
        const now = Date.now();
        
        const session = {
          userId: user.uuid,
          username: user.username,
          email: user.email || null,
          role: getUserRole(user.username),
          createdAt: now,
          expiresAt: now + APP_CONFIG.SESSION_DURATION,
          source: 'puter_sso',
          version: '2.0.0'
        };
        
        console.log('💾 Creating session:', sessionCode);
        
        // Store session in Puter KV
        await puter.kv.set(
          APP_CONFIG.SESSION_PREFIX + sessionCode, 
          JSON.stringify(session)
        );
        
        // Update session index
        let sessionIndex = [];
        try {
          const indexData = await puter.kv.get(APP_CONFIG.SESSION_INDEX_KEY);
          if (indexData) {
            sessionIndex = JSON.parse(indexData);
          }
        } catch (e) {
          console.warn('⚠️ Could not load session index, creating new:', e.message);
        }
        
        // Add to index (keep last 100 sessions)
        sessionIndex.push({
          code: sessionCode,
          userId: user.uuid,
          username: user.username,
          createdAt: now
        });
        
        // Keep only last 100 sessions in index
        if (sessionIndex.length > 100) {
          sessionIndex = sessionIndex.slice(-100);
        }
        
        await puter.kv.set(
          APP_CONFIG.SESSION_INDEX_KEY, 
          JSON.stringify(sessionIndex)
        );
        
        console.log('✅ Session created successfully');
        
        return { code: sessionCode, session };
      } catch (error) {
        console.error('❌ Session creation failed:', error);
        throw error;
      }
    }

    async function verifySession(code) {
      try {
        const data = await puter.kv.get(APP_CONFIG.SESSION_PREFIX + code);
        if (!data) {
          console.warn('⚠️ Session not found:', code);
          return null;
        }
        
        const session = JSON.parse(data);
        
        // Check expiration
        if (session.expiresAt < Date.now()) {
          console.warn('⚠️ Session expired:', code);
          await destroySession(code);
          return null;
        }
        
        console.log('✅ Session verified:', code);
        return session;
      } catch (error) {
        console.error('❌ Session verification failed:', error);
        return null;
      }
    }

    async function destroySession(code) {
      try {
        await puter.kv.del(APP_CONFIG.SESSION_PREFIX + code);
        console.log('🗑️ Session destroyed:', code);
      } catch (error) {
        console.error('❌ Session destruction failed:', error);
      }
    }

    // ═══════════════════════════════════════════════════════════
    // UI RENDERING
    // ═══════════════════════════════════════════════════════════
    
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="bg-slate-800/80 backdrop-blur-sm p-8 rounded-2xl border border-amber-500/30 max-w-md mx-auto animate-fadeIn shadow-2xl">
          <!-- Logo -->
          <div class="w-24 h-24 mx-auto mb-6 rounded-full bg-gradient-to-br from-amber-500 to-red-600 flex items-center justify-center shadow-lg">
            <span class="text-4xl">⚔️</span>
          </div>
          
          <!-- Title -->
          <h1 class="font-heading text-4xl text-amber-400 mb-2">GRUDGE Warlords</h1>
          <p class="text-slate-400 mb-8">Forge your destiny in the GRUDACHAIN</p>
          
          <!-- Sign In Button -->
          <button id="puter-login" class="w-full py-4 px-6 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white font-bold rounded-xl transition-all transform hover:scale-105 shadow-lg mb-4 flex items-center justify-center gap-3">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <span>Sign in with Puter</span>
          </button>
          
          <!-- Info -->
          <div class="mt-6 p-4 bg-slate-700/50 rounded-lg border border-slate-600">
            <p class="text-xs text-slate-400 mb-2">🔐 Secure authentication via Puter SSO</p>
            <p class="text-xs text-slate-500">Your session is encrypted and expires after 2 hours</p>
          </div>
          
          <!-- Footer -->
          <div class="mt-6 text-center">
            <p class="text-xs text-slate-600">GRUDGE Warlords © 2026</p>
            <p class="text-xs text-slate-700">Powered by GRUDACHAIN</p>
          </div>
        </div>
      `;
      
      document.getElementById('puter-login').addEventListener('click', handlePuterLogin);
    }

    function renderSuccess(username, role, sessionCode) {
      document.getElementById('app').innerHTML = `
        <div class="bg-slate-800/80 backdrop-blur-sm p-8 rounded-2xl border border-green-500/30 max-w-md mx-auto animate-fadeIn shadow-2xl">
          <!-- Success Icon -->
          <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-green-500/20 flex items-center justify-center">
            <svg class="w-12 h-12 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
          </div>
          
          <!-- Welcome Message -->
          <h2 class="font-heading text-3xl text-green-400 mb-3">Welcome, ${username}!</h2>
          
          <!-- Role Badge -->
          <div class="mb-6 inline-block px-4 py-2 rounded-full bg-amber-500/20 border border-amber-500/30">
            <p class="text-sm text-slate-400">
              Role: <span class="text-amber-400 font-bold uppercase">${role}</span>
            </p>
          </div>
          
          <!-- Status -->
          <div class="mb-6 space-y-2">
            <div class="flex items-center justify-center gap-2 text-slate-400">
              <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
              <span class="text-sm">Authentication successful</span>
            </div>
            <div class="flex items-center justify-center gap-2 text-slate-400">
              <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
              <span class="text-sm">Session created</span>
            </div>
            <div class="flex items-center justify-center gap-2 text-slate-400">
              <div class="w-2 h-2 bg-amber-400 rounded-full animate-pulse"></div>
              <span class="text-sm">Redirecting to GRUDGE Warlords...</span>
            </div>
          </div>
          
          <!-- Progress Bar -->
          <div class="w-full h-2 bg-slate-700 rounded-full overflow-hidden mb-4">
            <div class="h-full bg-gradient-to-r from-green-400 to-amber-400 animate-pulse" style="width: 100%"></div>
          </div>
          
          <p class="text-xs text-slate-500">Session Code: ${sessionCode.substring(0, 15)}...</p>
        </div>
      `;
    }

    function showError(message, details = null) {
      document.getElementById('app').innerHTML = `
        <div class="bg-slate-800/80 backdrop-blur-sm p-8 rounded-2xl border border-red-500/30 max-w-md mx-auto animate-fadeIn shadow-2xl">
          <!-- Error Icon -->
          <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-red-500/20 flex items-center justify-center">
            <svg class="w-12 h-12 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </div>
          
          <h2 class="font-heading text-2xl text-red-400 mb-3">Authentication Error</h2>
          <p class="text-slate-300 mb-4">${message}</p>
          
          ${details ? `<p class="text-xs text-slate-500 mb-4 font-mono bg-slate-900/50 p-2 rounded">${details}</p>` : ''}
          
          <button onclick="location.reload()" class="w-full px-6 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors">
            Try Again
          </button>
        </div>
      `;
    }

    // ═══════════════════════════════════════════════════════════
    // AUTHENTICATION FLOW
    // ═══════════════════════════════════════════════════════════
    
    async function handlePuterLogin() {
      try {
        console.log('🔐 Starting Puter authentication...');
        
        let user = null;
        
        // Check if already in Puter app context
        const params = new URLSearchParams(window.location.search);
        const isInPuterApp = params.has('puter.app_instance_id') || params.has('puter.auth.token');
        
        if (isInPuterApp) {
          console.log('📱 Running in Puter app context');
          user = await puter.auth.getUser();
        } else {
          console.log('🌐 Running in browser context, initiating sign in');
          user = await puter.auth.signIn();
        }
        
        if (!user) {
          throw new Error('User authentication returned null');
        }
        
        console.log('✅ User authenticated:', user.username);
        
        // Create session
        const { code, session } = await createSession(user);
        
        // Show success
        renderSuccess(user.username, session.role, code);
        
        // Redirect after delay
        setTimeout(() => {
          redirectToStudio(code, session);
        }, 2000);
        
      } catch (error) {
        console.error('❌ Login failed:', error);
        showError(
          'Authentication failed. Please try again.',
          error.message
        );
      }
    }

    function redirectToStudio(code, session) {
      const params = new URLSearchParams(window.location.search);
      const returnUrl = params.get('returnUrl') || params.get('return') || APP_CONFIG.STUDIO_URL;
      
      // Build redirect URL with auth code and role
      const separator = returnUrl.includes('?') ? '&' : '?';
      const redirectUrl = `${returnUrl}${separator}auth_code=${code}&role=${session.role}&username=${encodeURIComponent(session.username)}`;
      
      console.log('🚀 Redirecting to:', redirectUrl);
      window.location.href = redirectUrl;
    }

    // ═══════════════════════════════════════════════════════════
    // ROUTE HANDLING
    // ═══════════════════════════════════════════════════════════
    
    async function handleRoute() {
      const path = window.location.pathname;
      const params = new URLSearchParams(window.location.search);
      
      console.log('📍 Route:', path, 'Params:', Object.fromEntries(params));
      
      // Check if in Puter app context
      const isInPuterApp = params.has('puter.app_instance_id') || params.has('puter.auth.token');
      
      // ─────────────────────────────────────────────────────────
      // VERIFY ROUTE - Check session validity
      // ─────────────────────────────────────────────────────────
      if (path === '/verify' || params.has('verify')) {
        const code = params.get('code') || params.get('verify');
        const session = await verifySession(code);
        
        // Send response to parent window if in iframe
        if (window.parent !== window) {
          window.parent.postMessage({
            type: 'grudge_auth_verify',
            session,
            code,
            valid: !!session
          }, '*');
        }
        
        // Display result
        document.getElementById('app').innerHTML = `
          <div class="bg-slate-800/80 backdrop-blur-sm p-6 rounded-xl border border-slate-600 max-w-2xl mx-auto">
            <h2 class="text-xl font-bold mb-4 ${session ? 'text-green-400' : 'text-red-400'}">
              Session ${session ? 'Valid' : 'Invalid'}
            </h2>
            <pre class="text-left bg-slate-900 p-4 rounded-lg text-sm text-slate-300 overflow-auto">${JSON.stringify({ valid: !!session, session }, null, 2)}</pre>
          </div>
        `;
        return;
      }
      
      // ─────────────────────────────────────────────────────────
      // LOGOUT ROUTE - Destroy session and sign out
      // ─────────────────────────────────────────────────────────
      if (path === '/logout' || params.has('logout')) {
        const code = params.get('code') || params.get('session');
        
        if (code) {
          await destroySession(code);
        }
        
        // Sign out from Puter if not in app context
        if (!isInPuterApp) {
          try {
            await puter.auth.signOut();
            console.log('👋 Signed out from Puter');
          } catch (e) {
            console.warn('⚠️ Sign out skipped:', e.message);
          }
        }
        
        const returnUrl = params.get('returnUrl') || APP_CONFIG.STUDIO_URL;
        window.location.href = returnUrl;
        return;
      }
      
      // ─────────────────────────────────────────────────────────
      // AUTO-LOGIN - If already signed in to Puter
      // ─────────────────────────────────────────────────────────
      if (isInPuterApp) {
        try {
          const user = await puter.auth.getUser();
          if (user) {
            console.log('🔄 Auto-login detected for:', user.username);
            const { code, session } = await createSession(user);
            redirectToStudio(code, session);
            return;
          }
        } catch (e) {
          console.warn('⚠️ Auto-login failed:', e.message);
        }
      }
      
      // Check if already authenticated via Puter
      try {
        const isAuthenticated = await puter.auth.isSignedIn();
        if (isAuthenticated) {
          const user = await puter.auth.getUser();
          if (user) {
            console.log('🔄 Already authenticated:', user.username);
            const { code, session } = await createSession(user);
            redirectToStudio(code, session);
            return;
          }
        }
      } catch (e) {
        console.warn('⚠️ Auth check failed:', e.message);
      }
      
      // ─────────────────────────────────────────────────────────
      // DEFAULT ROUTE - Show login screen
      // ─────────────────────────────────────────────────────────
      renderLogin();
    }

    // ═══════════════════════════════════════════════════════════
    // MESSAGE HANDLER - For iframe communication
    // ═══════════════════════════════════════════════════════════
    
    window.addEventListener('message', async (event) => {
      if (event.data?.type === 'grudge_auth_request') {
        const { action, code } = event.data;
        
        console.log('📨 Received message:', action, code);
        
        if (action === 'verify') {
          const session = await verifySession(code);
          event.source.postMessage({
            type: 'grudge_auth_response',
            session,
            code,
            valid: !!session
          }, event.origin);
        }
        
        if (action === 'destroy') {
          await destroySession(code);
          event.source.postMessage({
            type: 'grudge_auth_response',
            action: 'destroyed',
            code
          }, event.origin);
        }
      }
    });

    // ═══════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════
    
    console.log('🚀 Initializing auth portal...');
    handleRoute();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRUDGE Battle Arena - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    .font-heading { font-family: 'Cinzel', serif; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .animate-fadeIn {
      animation: fadeIn 0.6s ease-out;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .animate-pulse-slow {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-red-900/20 to-slate-900 flex items-center justify-center p-4">
  <div id="app" class="text-center p-8 max-w-2xl w-full"></div>

  <script type="module">
    const API_URL = import.meta.env.VITE_SERVER_URL || 'http://localhost:2567';
    
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="bg-slate-800/80 backdrop-blur-sm p-8 rounded-2xl border border-red-500/30 max-w-md mx-auto animate-fadeIn shadow-2xl">
          <!-- Logo -->
          <div class="w-32 h-32 mx-auto mb-6 rounded-full bg-gradient-to-br from-red-500 to-orange-600 flex items-center justify-center shadow-lg animate-float">
            <span class="text-6xl">⚔️</span>
          </div>
          
          <!-- Title -->
          <h1 class="font-heading text-4xl text-red-400 mb-2">GRUDGE Battle Arena</h1>
          <p class="text-slate-400 mb-8">Enter the multiplayer battlefield</p>
          
          <!-- Login/Register Toggle -->
          <div class="flex gap-2 mb-6">
            <button id="login-tab" class="flex-1 py-2 px-4 bg-red-500 text-white rounded-lg transition-all font-bold">
              Login
            </button>
            <button id="register-tab" class="flex-1 py-2 px-4 bg-slate-700 text-slate-300 rounded-lg transition-all">
              Register
            </button>
          </div>
          
          <!-- Login Form -->
          <div id="login-form">
            <input id="login-username" type="text" placeholder="Username" class="w-full mb-3 px-4 py-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:border-red-500 focus:outline-none" />
            <input id="login-password" type="password" placeholder="Password" class="w-full mb-4 px-4 py-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:border-red-500 focus:outline-none" />
            <button id="login-btn" class="w-full py-4 px-6 bg-gradient-to-r from-red-500 to-orange-600 hover:from-red-400 hover:to-orange-500 text-white font-bold rounded-xl transition-all transform hover:scale-105 shadow-lg mb-4">
              ⚔️ Enter Battle Arena
            </button>
          </div>
          
          <!-- Register Form -->
          <div id="register-form" class="hidden">
            <input id="reg-username" type="text" placeholder="Username (3-20 chars)" class="w-full mb-3 px-4 py-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:border-red-500 focus:outline-none" />
            <input id="reg-email" type="email" placeholder="Email (optional)" class="w-full mb-3 px-4 py-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:border-red-500 focus:outline-none" />
            <input id="reg-password" type="password" placeholder="Password (4+ chars)" class="w-full mb-3 px-4 py-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:border-red-500 focus:outline-none" />
            <input id="reg-password2" type="password" placeholder="Confirm Password" class="w-full mb-4 px-4 py-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:border-red-500 focus:outline-none" />
            <button id="register-btn" class="w-full py-4 px-6 bg-gradient-to-r from-green-500 to-teal-600 hover:from-green-400 hover:to-teal-500 text-white font-bold rounded-xl transition-all transform hover:scale-105 shadow-lg mb-4">
              🛡️ Create Account
            </button>
          </div>
          
          <!-- Guest Login -->
          <div class="border-t border-slate-600 pt-4 mt-4">
            <button id="guest-btn" class="w-full py-3 px-6 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-all">
              👤 Play as Guest
            </button>
          </div>
          
          <!-- Error Message -->
          <div id="error-msg" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/30 rounded-lg text-red-400 text-sm"></div>
          
          <!-- Info -->
          <div class="mt-6 p-4 bg-slate-700/50 rounded-lg border border-slate-600">
            <p class="text-xs text-slate-400 mb-2">🔐 Unified Grudge Studio Account</p>
            <p class="text-xs text-slate-500">Use the same account across all Grudge games</p>
            <p class="text-xs text-slate-500 mt-2">💰 New users get 1000 gold + Crossmint wallet</p>
          </div>
          
          <!-- Footer -->
          <div class="mt-6 text-center">
            <p class="text-xs text-slate-600">GRUDGE Battle Arena © 2026</p>
            <p class="text-xs text-slate-700">Powered by GRUDGE Studio</p>
          </div>
        </div>
      `;
      
      setupEventListeners();
    }

    function setupEventListeners() {
      // Tab switching
      document.getElementById('login-tab').addEventListener('click', () => {
        document.getElementById('login-tab').className = 'flex-1 py-2 px-4 bg-red-500 text-white rounded-lg transition-all font-bold';
        document.getElementById('register-tab').className = 'flex-1 py-2 px-4 bg-slate-700 text-slate-300 rounded-lg transition-all';
        document.getElementById('login-form').classList.remove('hidden');
        document.getElementById('register-form').classList.add('hidden');
      });
      
      document.getElementById('register-tab').addEventListener('click', () => {
        document.getElementById('register-tab').className = 'flex-1 py-2 px-4 bg-green-500 text-white rounded-lg transition-all font-bold';
        document.getElementById('login-tab').className = 'flex-1 py-2 px-4 bg-slate-700 text-slate-300 rounded-lg transition-all';
        document.getElementById('register-form').classList.remove('hidden');
        document.getElementById('login-form').classList.add('hidden');
      });
      
      // Form submissions
      document.getElementById('login-btn').addEventListener('click', handleLogin);
      document.getElementById('register-btn').addEventListener('click', handleRegister);
      document.getElementById('guest-btn').addEventListener('click', handleGuest);
      
      // Enter key listeners
      document.getElementById('login-password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
      document.getElementById('reg-password2').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleRegister();
      });
    }

    function showError(message) {
      const errorDiv = document.getElementById('error-msg');
      errorDiv.textContent = message;
      errorDiv.classList.remove('hidden');
      setTimeout(() => errorDiv.classList.add('hidden'), 5000);
    }

    async function handleLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      
      if (!username || !password) {
        showError('Please enter username and password');
        return;
      }
      
      try {
        const res = await fetch(\`\${API_URL}/auth/login\`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          showError(data.error || 'Login failed');
          return;
        }
        
        // Store auth data
        localStorage.setItem('grudge_auth_token', data.token);
        localStorage.setItem('grudge_user_id', data.userId);
        localStorage.setItem('grudge_username', data.username);
        localStorage.setItem('grudge_id', data.grudgeId);
        if (data.walletAddress) {
          localStorage.setItem('grudge_wallet_address', data.walletAddress);
        }
        
        // Show success and redirect
        showSuccess(data.username, data.grudgeId, data.walletAddress);
      } catch (error) {
        showError('Network error. Please try again.');
      }
    }

    async function handleRegister() {
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;
      
      if (!username || !password) {
        showError('Username and password are required');
        return;
      }
      
      if (password !== password2) {
        showError('Passwords do not match');
        return;
      }
      
      try {
        const res = await fetch(\`\${API_URL}/auth/register\`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email: email || undefined, password })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          showError(data.error || 'Registration failed');
          return;
        }
        
        // Store auth data
        localStorage.setItem('grudge_auth_token', data.token);
        localStorage.setItem('grudge_user_id', data.userId);
        localStorage.setItem('grudge_username', data.username);
        localStorage.setItem('grudge_id', data.grudgeId);
        if (data.walletAddress) {
          localStorage.setItem('grudge_wallet_address', data.walletAddress);
        }
        
        // Show success and redirect
        showSuccess(data.username, data.grudgeId, data.walletAddress, true);
      } catch (error) {
        showError('Network error. Please try again.');
      }
    }

    async function handleGuest() {
      const deviceId = localStorage.getItem('device_id') || crypto.randomUUID();
      localStorage.setItem('device_id', deviceId);
      
      try {
        const res = await fetch(\`\${API_URL}/auth/guest\`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ deviceId })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          showError(data.error || 'Guest login failed');
          return;
        }
        
        // Store auth data
        localStorage.setItem('grudge_auth_token', data.token);
        localStorage.setItem('grudge_user_id', data.userId);
        localStorage.setItem('grudge_username', data.username);
        localStorage.setItem('grudge_id', data.grudgeId);
        localStorage.setItem('is_guest', 'true');
        
        // Redirect immediately for guests
        window.location.href = '/';
      } catch (error) {
        showError('Network error. Please try again.');
      }
    }

    function showSuccess(username, grudgeId, walletAddress, isNew = false) {
      document.getElementById('app').innerHTML = `
        <div class="bg-slate-800/80 backdrop-blur-sm p-8 rounded-2xl border border-green-500/30 max-w-md mx-auto animate-fadeIn shadow-2xl">
          <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-green-500/20 flex items-center justify-center">
            <svg class="w-12 h-12 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
          </div>
          
          <h2 class="font-heading text-3xl text-green-400 mb-3">\${isNew ? 'Account Created!' : 'Welcome Back!'}</h2>
          <p class="text-xl text-slate-300 mb-4">\${username}</p>
          
          <div class="mb-6 space-y-2">
            <div class="px-4 py-2 rounded-lg bg-red-500/20 border border-red-500/30">
              <p class="text-sm text-slate-400">Grudge ID</p>
              <p class="text-red-400 font-mono font-bold">\${grudgeId}</p>
            </div>
            \${walletAddress ? \`
              <div class="px-4 py-2 rounded-lg bg-purple-500/20 border border-purple-500/30">
                <p class="text-sm text-slate-400">Wallet Address</p>
                <p class="text-purple-400 font-mono text-xs">\${walletAddress.substring(0, 20)}...</p>
              </div>
            \` : ''}
            \${isNew ? \`
              <div class="px-4 py-2 rounded-lg bg-yellow-500/20 border border-yellow-500/30">
                <p class="text-yellow-400">💰 Starter Bonus: 1000 Gold</p>
              </div>
            \` : ''}
          </div>
          
          <div class="mb-6 space-y-2">
            <div class="flex items-center justify-center gap-2 text-slate-400">
              <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
              <span class="text-sm">Authentication successful</span>
            </div>
            <div class="flex items-center justify-center gap-2 text-slate-400">
              <div class="w-2 h-2 bg-red-400 rounded-full animate-pulse"></div>
              <span class="text-sm">Entering the arena...</span>
            </div>
          </div>
          
          <div class="w-full h-2 bg-slate-700 rounded-full overflow-hidden mb-4">
            <div class="h-full bg-gradient-to-r from-green-400 to-red-400 animate-pulse" style="width: 100%"></div>
          </div>
        </div>
      `;
      
      setTimeout(() => {
        window.location.href = '/';
      }, 2000);
    }

    // Initialize
    renderLogin();
  </script>
</body>
</html>
